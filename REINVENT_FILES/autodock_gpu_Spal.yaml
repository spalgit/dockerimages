# AutoDock GPU
# ============
#
# Runs docking with AutoDockGrPOU (with a REINVENT interface)
#

name: AutoDockGPU
level: info

nodes:
- name: rnv_smiles_in
  type: ReinventEntry
- name: preplig
  type: Gypsum
- name: adgpu
  type: AutoDockGPU
- name: rnv_out
  type: ReinventExit
- name: void
  type: Void
- name: isocopy
  type: Copy
- name: bestisomerfilter
  type: BestIsomerFilter
- name: save_best_pose
  type: SaveSingleLibrary
- name: rmsd
  type: RMSD
- name: loadmol
  type: LoadMolecule
- name: logt
  type: LogTags
- name: sort
  type: TagSorter
- name: adgpu-hp
  type: AutoDockGPU
- name: mergelists 
  type: MergeLists 

channels:
- sending:
    rnv_smiles_in: out
  receiving:
    preplig: inp
- sending:
    preplig: out
  receiving:
    adgpu: inp
- sending:
    adgpu: out
  receiving:
    rmsd: inp
- sending:
    rmsd: out
  receiving:
    logt: inp
- sending:
    loadmol: out
  receiving:
    rmsd: inp_ref
- sending:
    logt: out 
  receiving:
    sort: inp
- sending:
    sort: out
  receiving:
    mergelists: inp 
- sending:
    sort: out
  receiving:
    adgpu-hp: inp
- sending:
    adgpu-hp: out
  receiving:
    mergelists: inp
- sending:
    mergelists: out
  receiving:
    isocopy: inp
- sending:
    isocopy: out
  receiving:
    rnv_out: inp
- sending:
    isocopy: out
  receiving:
    bestisomerfilter: inp
- sending:
    bestisomerfilter: out
  receiving:
    save_best_pose: inp
- sending:
    rnv_smiles_in: out_metadata
  receiving:
    void: inp
- sending:
    adgpu: out_scores
  receiving:
    void: inp   
- sending:
    adgpu-hp: out_scores
  receiving:
    void: inp


parameters:

# DO NOT TOUCH: required input parameters
- name: inp
  map:
  - rnv_smiles_in: data
- name: out
  map:
  - rnv_out: data
- name: scores_only
  value: false
  map:
  - adgpu: scores_only
- name: strict
  value: false
  map:
  - adgpu: strict

# Gpysum (optional)
- name: num_variants  # optional
  map:
  - preplig: n_variants  # int
- name: thoroughness  # optional
  map:
  - preplig: thoroughness  # int
- name: pH_range  # optional
  map:
  - preplig: ph_range  # list(float, float)
- name: num_jobs  # optional
  map:
  - preplig: n_jobs  # int

# Autodock GPU
- name: grid_file  # mandatory
  map:
  - adgpu: grid_file  # str
- name: ref_ligand  # optional
  map:
  - adgpu: ref_ligand  # str
- name: seed  # optional
  map:
  - adgpu: seed  # int
- name: heuristics  # optional
  map:
  - adgpu: heuristics  # int
- name: heurmax  # optional
  map:
  - adgpu: heurmax  # int
- name: num_runs  # optional
  map:
  - adgpu: nrun  # int
- name: population_size  # optional
  map:
  - adgpu: population_size  # int
- name: local_search_iterations  # optional
  map:
  - adgpu: lsit # int
- name: atom_mapping  # optional
  map:
  - adgpu: derivtypes  # dict
- name: constraints  # optional
  map:
  - adgpu: constraints  # bool

# Autodock GPU HP

- name: grid_file_hp
  map:
    - adgpu-hp: grid_file
- name: num_runs_hp  # optional
  value: 50
  map:
  - adgpu-hp: nrun  # int
- name: population_size_hp  # optional
  value: 300
  map:
  - adgpu-hp: population_size  # int
- name: local_search_iterations_hp  # optional
  value: 500
  map:
  - adgpu-hp: lsit # int


# BestIsomerFilter
- name: score_tag  # optional
  map:
  - bestisomerfilter: score_tag   # str

# SaveSingleLibrary
- name: save_best_pose_file
  map:
  - save_best_pose: file

# REINVENT
- name: tag
  value: energy
  map:
  - rnv_out: tag

# Logtag
- name: logt_t
  value: rmsd
  map:
  - logt: tag 


# Logtag
- name: tagsorter 
  value: [rmsd < 3.0, rmsd >= 3.0 ] 
  map:
  - sort: sorter 

# LoadMolecule
- name: loadmol_file
  map:
  - loadmol: path 

# Mergelists
#- name: mergelists
#  value: [IsomerCollection]
#  map:
#  - mergelists: commands 
