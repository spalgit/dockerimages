name: sandboxaq
# Install to /mnt/data/sandeep/conda/envs/sandboxaq with:
#   conda env create -f sandboxaq_environment.yml --prefix /mnt/data/sandeep/conda/envs/sandboxaq
channels:
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - kalign2=2.04          # required by openfold3 for MSA; must come from bioconda
  - pip
  - pip:
      - torch==2.10.0
      - nvidia-cublas-cu12==12.8.4.1
      - nvidia-cuda-cupti-cu12==12.8.90
      - nvidia-cuda-nvrtc-cu12==12.8.93
      - nvidia-cuda-runtime-cu12==12.8.90
      - nvidia-cudnn-cu12==9.10.2.21
      - nvidia-cufft-cu12==11.3.3.83
      - nvidia-cufile-cu12==1.13.1.3
      - nvidia-curand-cu12==10.3.9.90
      - nvidia-cusolver-cu12==11.7.3.90
      - nvidia-cusparse-cu12==12.5.8.93
      - nvidia-cusparselt-cu12==0.7.1
      - nvidia-cutlass==3.8.0.0
      - nvidia-nccl-cu12==2.27.5
      - nvidia-nvjitlink-cu12==12.8.93
      - nvidia-nvtx-cu12==12.8.90
      - triton==3.6.0
      - pytorch-lightning==2.6.0
      - torchmetrics==1.8.2
      - lightning-utilities==0.15.2
      - numpy==2.2.6
      - pandas==2.3.3
      - scipy==1.15.3
      - rdkit==2025.9.3
      - biotite==1.2.0
      - biotraj==1.2.2
      - gemmi==0.7.4
      - pdbeccdutils==1.0.0
      - ml-collections==1.1.0
      - einops==0.8.2
      - deepspeed==0.18.4
      - wandb==0.24.0
      - huggingface-hub==1.3.3
      - hf-xet==1.2.0
      - boto3==1.42.36
      - botocore==1.42.36
      - awscli==1.44.26
      - lmdb==1.7.5
      - msgpack==1.1.2
      - ijson==3.4.0.post0
      - aria2==0.0.1b0
      - func-timeout==4.3.5
      - memory-profiler==0.61.0
      - mkl==2025.3.1
      - intel-openmp==2025.3.2
      - tbb==2022.3.1
      - cuda-python==12.9.0
      - ninja==1.13.0
      - tqdm==4.67.1
      - pyyaml==6.0.3
      - click==8.3.1
      - pydantic==2.12.1
      - requests==2.32.5
      - aiohttp==3.13.3
      - fsspec==2026.1.0
      - networkx==3.4.2
      - sympy==1.14.0
      - packaging==26.0
      - typing-extensions==4.15.0
      - psutil==7.2.1
      - treelib==1.8.0
      - gitpython==3.1.46
      - protobuf==6.33.4
      - sentry-sdk==2.51.0
      # aqaffinity + openfold3 are installed separately in the setup script
      # (downloaded via 'hf download' then 'pip install' from local path)
variables:
  OPENFOLD_CACHE: /mnt/data/sandeep/openfold3_weights
