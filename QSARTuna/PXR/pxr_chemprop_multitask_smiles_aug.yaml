# ChemProp multi-task model — error-weighted cliff smoothing + SMILES augmentation
#
# Training data pipeline:
#   1. Activity-cliff pairs from Compounds_with_activity_cliff.csv (0.97 sim threshold)
#      203 pairs, 61 series, 184 unique compounds
#   2. Experimental error filter (% error = pEC50_std.error / pEC50 * 100):
#      - Series (3+ members): high-error compounds (>5%) excluded from median;
#        all series members receive the resulting median.
#      - Pairs: high-error member (>5%) removed from training set entirely (16 removed);
#        low-error partner kept with its own pEC50 unchanged.
#      - Pairs (both low or both high error): mean of pEC50 values used.
#   3. SMILES augmentation: 2 additional randomized SMILES per inactive compound
#      (pEC50 <= 3.5), bringing active/inactive ratio from 3.3x to 1.09x.
#      All sample weights = 1.0 (no weighting).
#
# Generate data:
#   python ~/dockerimages/QSARTuna/PXR/make_cliff_error_weighted_median.py
#   python ~/dockerimages/QSARTuna/PXR/make_cliff_augmented_inactive.py
#
# Train:
#   conda activate openadmet-models
#   cd ~/OpenAdmet
#   openadmet train --config ~/dockerimages/QSARTuna/PXR/pxr_chemprop_multitask_smiles_aug.yaml

data:
  anvil_dir: file:///home/spal/dockerimages/QSARTuna/PXR
  type: intake
  resource: /home/spal/dockerimages/QSARTuna/PXR/train_cliff_error_augmented.csv
  input_col: SMILES
  target_cols:
  - pEC50
  - pEC50_counter
  dropna: false

metadata:
  authors: Sandeep Pal
  email: sandeepbii@yahoo.com
  biotargets:
  - PXR
  build_number: 0
  description: >
    Multi-task ChemProp regressor trained with error-aware cliff smoothing and
    SMILES augmentation. Activity-cliff pairs (0.97 similarity threshold) are
    smoothed using experimental error: in series (3+ members) high-error
    compounds (pEC50_std.error/pEC50 > 5%) are excluded from the median; in
    pairs the high-error compound is removed entirely and the reliable partner
    kept. Class imbalance is addressed by 2x SMILES augmentation of inactive
    compounds (pEC50 <= 3.5), giving an active/inactive ratio of 1.09x with
    uniform sample weights. Direct pEC50 regression, no PTR transform.
  driver: pytorch
  name: pxr_chemprop_multitask_smiles_aug
  tag: pxr-multitask-smiles-aug
  tags:
  - openadmet
  - pxr
  - multitask
  - cliff-error-smoothing
  - smiles-augmentation
  version: v1

procedure:
  feat:
    type: ChemPropFeaturizer
    params: {}

  model:
    type: ChemPropModel
    params:
      n_tasks: 2
      messages: bond
      aggregation: norm
      depth: 4
      message_hidden_dim: 600
      ffn_hidden_dim: 600
      ffn_num_layers: 3
      dropout: 0.15
      batch_norm: true
      normalized_targets: true
      from_chemeleon: false
      scheduler: noam
      max_lr: 0.001
      warmup_epochs: 2

  split:
    type: ScaffoldSplitter
    params:
      random_state: 42
      train_size: 0.85
      val_size: 0.05
      test_size: 0.10

  train:
    type: LightningTrainer
    params:
      accelerator: gpu
      early_stopping: true
      early_stopping_patience: 15
      early_stopping_mode: min
      early_stopping_min_delta: 0.001
      max_epochs: 120
      monitor_metric: val_loss
      use_wandb: false

report:
  eval:
  - type: RegressionMetrics
    params: {}
  - type: PytorchLightningRepeatedKFoldCrossValidation
    params:
      axes_labels:
      - True pEC50
      - Predicted pEC50
      n_repeats: 3
      n_splits: 5
      random_state: 42
      pXC50: true
      title: Multi-task ChemProp — error-smoothed cliffs + SMILES augmentation — scaffold 5-fold CV
