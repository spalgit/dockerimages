# ChemProp multi-task model — cliff smoothing (inactive-only) + PTR v3
# Mixed series (any member pEC50 >= 3.5) left untouched; SAR signal preserved.
# PTR v3: threshold=5.0, std=0.55
#
# Reverse transform at inference:
#   pEC50_pred = norm.ppf(ptr_pred, loc=5.0, scale=0.55)
#
# Generate data:
#   python make_cliff_median_training_data_v2.py --inactive_only
#
# Train:
#   conda activate openadmet-models
#   cd /home/spal/dockerimages/QSARTuna/PXR
#   openadmet train --config pxr_chemprop_multitask_cw_ptr_v3_inactive_only.yaml

data:
  anvil_dir: file:///home/spal/dockerimages/QSARTuna/PXR
  type: intake
  resource: /home/spal/dockerimages/QSARTuna/PXR/train_cliff_median_v2_inactive_only_ptr_v3.csv
  input_col: SMILES
  target_cols:
  - pEC50
  - pEC50_counter
  weight_col: weight
  dropna: false

metadata:
  authors: Sandeep Pal
  email: sandeepbii@yahoo.com
  biotargets:
  - PXR
  build_number: 0
  description: >
    Multi-task ChemProp regressor — activity-cliff smoothing restricted to
    all-inactive series (pEC50 < 3.5 for all members), then PTR v3 transform
    (threshold=5.0, std=0.55) applied. 25 series / 99 compounds smoothed to
    series median; 36 mixed series (85 compounds) untouched. Inactives
    upweighted 2.5x. Reverse transform at inference: norm.ppf(pred, 5.0, 0.55).
  driver: pytorch
  name: pxr_chemprop_multitask_cw_ptr_v3_inactive_only
  tag: pxr-multitask-cw-ptr-v3-inactive-only
  tags:
  - openadmet
  - pxr
  - multitask
  - cliff-weighted
  - ptr-v3
  - inactive-only
  version: v1

procedure:
  feat:
    type: ChemPropFeaturizer
    params: {}

  model:
    type: ChemPropModel
    params:
      n_tasks: 2
      messages: bond
      aggregation: norm
      depth: 4
      message_hidden_dim: 600
      ffn_hidden_dim: 600
      ffn_num_layers: 3
      dropout: 0.15
      batch_norm: true
      normalized_targets: true
      from_chemeleon: false
      scheduler: noam
      max_lr: 0.001
      warmup_epochs: 2

  split:
    type: ScaffoldSplitter
    params:
      random_state: 42
      train_size: 0.85
      val_size: 0.05
      test_size: 0.10

  train:
    type: LightningTrainer
    params:
      accelerator: gpu
      early_stopping: true
      early_stopping_patience: 15
      early_stopping_mode: min
      early_stopping_min_delta: 0.001
      max_epochs: 120
      monitor_metric: val_loss
      use_wandb: false

report:
  eval:
  - type: RegressionMetrics
    params: {}
  - type: PytorchLightningRepeatedKFoldCrossValidation
    params:
      axes_labels:
      - True PTR v3
      - Predicted PTR v3
      n_repeats: 3
      n_splits: 5
      random_state: 42
      pXC50: false
      title: Multi-task ChemProp PTR v3 cliff-median (inactive-only) — scaffold 5-fold CV
