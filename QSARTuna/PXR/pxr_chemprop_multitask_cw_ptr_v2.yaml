# ChemProp multi-task model with PTR v2 labels
# PTR parameters: threshold=3.5 (active/inactive boundary), std=1.00 (spans full pEC50 range)
#
# Reverse transform at inference:
#   pEC50_pred = norm.ppf(ptr_pred, loc=3.5, scale=1.00)
#
# Train:
#   conda activate openadmet-models
#   cd /home/spal/dockerimages/QSARTuna/PXR
#   python make_ptr_training_data_v2.py        # generate train_ptr_v2.csv
#   openadmet train --config pxr_chemprop_multitask_cw_ptr_v2.yaml

data:
  anvil_dir: file:///home/spal/dockerimages/QSARTuna/PXR
  type: intake
  resource: /home/spal/dockerimages/QSARTuna/PXR/train_ptr_v2.csv
  input_col: SMILES
  target_cols:
  - pEC50
  - pEC50_counter
  weight_col: weight
  dropna: false

metadata:
  authors: Sandeep Pal
  email: sandeepbii@yahoo.com
  biotargets:
  - PXR
  build_number: 0
  description: >
    Multi-task ChemProp regressor trained on PTR v2 labels.
    threshold=3.5 (aligns with LGBM active/inactive boundary).
    std=1.00 (wide enough to keep full pEC50 range [1.7-7.5] recoverable).
    Reverse transform: norm.ppf(pred, 3.5, 1.00).
  driver: pytorch
  name: pxr_chemprop_multitask_cw_ptr_v2
  tag: pxr-multitask-cw-ptr-v2
  tags:
  - openadmet
  - pxr
  - multitask
  - cliff-weighted
  - ptr-v2
  version: v1

procedure:
  feat:
    type: ChemPropFeaturizer
    params: {}

  model:
    type: ChemPropModel
    params:
      n_tasks: 2
      messages: bond
      aggregation: norm
      depth: 4
      message_hidden_dim: 600
      ffn_hidden_dim: 600
      ffn_num_layers: 3
      dropout: 0.15
      batch_norm: true
      normalized_targets: true
      from_chemeleon: false
      scheduler: noam
      max_lr: 0.001
      warmup_epochs: 2

  split:
    type: ScaffoldSplitter
    params:
      random_state: 42
      train_size: 0.85
      val_size: 0.05
      test_size: 0.10

  train:
    type: LightningTrainer
    params:
      accelerator: gpu
      early_stopping: true
      early_stopping_patience: 15
      early_stopping_mode: min
      early_stopping_min_delta: 0.001
      max_epochs: 120
      monitor_metric: val_loss
      use_wandb: false

report:
  eval:
  - type: RegressionMetrics
    params: {}
  - type: PytorchLightningRepeatedKFoldCrossValidation
    params:
      axes_labels:
      - True PTR v2
      - Predicted PTR v2
      n_repeats: 3
      n_splits: 5
      random_state: 42
      pXC50: false
      title: Multi-task ChemProp PTR v2 — scaffold 5-fold CV
