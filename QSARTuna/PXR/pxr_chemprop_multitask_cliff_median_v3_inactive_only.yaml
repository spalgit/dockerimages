# ChemProp multi-task model — cliff smoothing v3 (inactive-only)
# Source cliff file: Compounds_with_activity_cliff_2.csv (similarity threshold 0.95)
#   305 pairs, 100 series, 313 unique compounds
#   24 all-inactive series (106 compounds) smoothed to series median
#   76 mixed series (207 compounds) left untouched — SAR signal preserved
# Direct pEC50 regression — no PTR transform.
#
# Generate data:
#   python ~/dockerimages/QSARTuna/PXR/make_cliff_median_training_data_v3.py
#
# Train:
#   conda activate openadmet-models
#   cd ~/OpenAdmet_After_Phase1
#   openadmet train --config ~/dockerimages/QSARTuna/PXR/pxr_chemprop_multitask_cliff_median_v3_inactive_only.yaml

data:
  anvil_dir: file:///home/spal/dockerimages/QSARTuna/PXR
  type: intake
  resource: /home/spal/dockerimages/QSARTuna/PXR/train_cliff_median_v3_inactive_only.csv
  input_col: SMILES
  target_cols:
  - pEC50
  - pEC50_counter
  weight_col: weight
  dropna: false

metadata:
  authors: Sandeep Pal
  email: sandeepbii@yahoo.com
  biotargets:
  - PXR
  build_number: 0
  description: >
    Multi-task ChemProp regressor — activity-cliff smoothing restricted to
    all-inactive series (pEC50 < 3.5 for all members), using expanded cliff
    file (similarity threshold 0.95). 24 series / 106 compounds smoothed to
    series median; 76 mixed series (207 compounds) untouched. Inactives
    upweighted 2.5x. Direct pEC50 regression (no PTR transform).
  driver: pytorch
  name: pxr_chemprop_multitask_cliff_median_v3_inactive_only
  tag: pxr-multitask-cliff-median-v3-inactive-only
  tags:
  - openadmet
  - pxr
  - multitask
  - cliff-median-v3
  - inactive-only
  version: v1

procedure:
  feat:
    type: ChemPropFeaturizer
    params: {}

  model:
    type: ChemPropModel
    params:
      n_tasks: 2
      messages: bond
      aggregation: norm
      depth: 4
      message_hidden_dim: 600
      ffn_hidden_dim: 600
      ffn_num_layers: 3
      dropout: 0.15
      batch_norm: true
      normalized_targets: true
      from_chemeleon: false
      scheduler: noam
      max_lr: 0.001
      warmup_epochs: 2

  split:
    type: ScaffoldSplitter
    params:
      random_state: 42
      train_size: 0.85
      val_size: 0.05
      test_size: 0.10

  train:
    type: LightningTrainer
    params:
      accelerator: gpu
      early_stopping: true
      early_stopping_patience: 15
      early_stopping_mode: min
      early_stopping_min_delta: 0.001
      max_epochs: 120
      monitor_metric: val_loss
      use_wandb: false

report:
  eval:
  - type: RegressionMetrics
    params: {}
  - type: PytorchLightningRepeatedKFoldCrossValidation
    params:
      axes_labels:
      - True pEC50
      - Predicted pEC50
      n_repeats: 3
      n_splits: 5
      random_state: 42
      pXC50: true
      title: Multi-task ChemProp cliff-median v3 (inactive-only, 0.95 sim) — scaffold 5-fold CV
